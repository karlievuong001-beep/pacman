<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Arcade English</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: black; 
            color: white; 
            font-family: 'Press Start 2P', cursive; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        
        #header {
            display: flex;
            justify-content: space-around;
            width: 500px;
            margin: 0 auto 20px auto;
            font-size: 14px;
            color: #fff;
        }

        .highlight { color: #ffff00; }

        canvas { 
            background-color: black; 
            display: block; 
            margin: 0 auto; 
            image-rendering: pixelated; /* Giữ nét răng cưa cổ điển */
        }
        
        #modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 10; 
        }
        
        #modal-content { 
            background: black; padding: 30px; width: 600px; 
            margin: 10vh auto; 
            border: 4px solid #1919A6; /* Viền xanh chuẩn Pacman */
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(25, 25, 166, 0.8);
            font-family: 'Segoe UI', Tahoma, sans-serif; /* Chữ câu hỏi dễ đọc hơn */
        }
        
        #question-text { 
            font-size: 22px; color: yellow; margin-bottom: 20px; 
            font-family: 'Press Start 2P', cursive;
            line-height: 1.5;
            font-size: 16px;
        }
        
        .btn { 
            display: block; width: 100%; 
            margin: 12px 0; padding: 15px; 
            background: #222; color: white; 
            border: 2px solid #555; cursor: pointer; 
            font-size: 18px; font-weight: bold;
            transition: 0.2s; text-align: left;
        }
        
        .btn:hover { 
            background: #1919A6; border-color: white; 
        }
    </style>
</head>
