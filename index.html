<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Pac-Man English</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: black; color: white; 
            font-family: 'Press Start 2P', cursive; 
            margin: 0; padding: 0; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* --- GIAO DIỆN MÀN HÌNH CHỜ --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #FFDE00; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50;
        }
        
        .hamburger {
            position: absolute; top: 20px; left: 20px; width: 35px; height: 25px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .hamburger div { width: 100%; height: 4px; background-color: white; }
        
        .start-box {
            position: relative; width: 220px; height: 50px; 
            background-color: black; border: 4px solid #1919A6; border-radius: 8px;
            overflow: hidden; cursor: pointer; transition: transform 0.2s;
        }
        .start-box:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        
        .demo-dots {
            position: absolute; top: 50%; transform: translateY(-50%); left: 20px;
            display: flex; gap: 15px; z-index: 1;
        }
        .demo-dots div { width: 6px; height: 6px; background-color: #FFB8AE; border-radius: 50%; }

        .demo-pacman-container {
            position: absolute; top: 50%; transform: translateY(-50%); left: -40px;
            display: flex; align-items: center; z-index: 2;
            animation: movePacman 3s linear infinite;
        }
        
        .pacman-mask {
            width: 250px; height: 50px; background-color: black;
            position: absolute; right: 12px; 
        }
        
        .demo-pacman {
            width: 24px; height: 24px; background-color: yellow; border-radius: 50%;
            position: relative; z-index: 3;
            animation: chomp 0.2s alternate infinite;
        }

        @keyframes movePacman { 0% { left: -40px; } 100% { left: 260px; } }
        @keyframes chomp {
            0% { clip-path: polygon(100% 74%, 50% 50%, 100% 26%, 100% 0, 0 0, 0 100%, 100% 100%); }
            100% { clip-path: polygon(100% 50%, 50% 50%, 100% 50%, 100% 0, 0 0, 0 100%, 100% 100%); }
        }
        
        .start-text { color: black; margin-top: 30px; font-size: 14px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
