<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Classic Pro - Neon Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Phong cách tổng thể: Neon Arcade */
        body { 
            background: radial-gradient(circle at center, #1a0b2e 0%, #05010f 100%); 
            color: white; 
            font-family: 'Fredoka', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            min-height: 100vh;
        }
        
        /* Bảng điểm và thông tin: Glassmorphism */
        .controls { 
            margin-bottom: 25px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 15px 30px; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        #ui { 
            font-size: 24px; 
            font-weight: 600; 
            color: #00ffff; 
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        #score-num, #dot-num, #lives-num { 
            color: #ff00ff; 
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5); 
        }
        
        .dot-counter {
            font-size: 16px;
            color: #aaa;
        }

        /* Khu vực chơi game (Canvas) */
        .game-scale-wrapper {
            width: 85vh; /* Tự động phóng to theo chiều cao màn hình */
            max-width: 95vw; /* Chống tràn bề ngang trên điện thoại */
            position: relative;
        }

        canvas { 
            width: 100%; height: auto;
            background-color: #0a0a0a; 
            border: 4px solid #ff00ff; 
            box-shadow: 0 0 20px #ff00ff, inset 0 0 15px #ff00ff; 
            border-radius: 10px;
            display: block;
            image-rendering: pixelated; /* Giữ nét vuông vức 8-bit */
        }

        /* Dòng trợ giúp */
        .control-help {
            font-size: 15px; 
            color: #aaa; 
            margin-top: 15px; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Hộp thoại Câu hỏi (Modal) */
        #modal { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(5px);
            z-index: 100; 
            animation: fadeIn 0.3s ease;
        }
        
        #modal-content { 
            background: linear-gradient(135deg, #2b1055, #120924); 
            padding: 35px; width: 550px; max-width: 90vw;
            margin: 6vh auto; border-radius: 20px; 
            border: 2px solid #00ffff; 
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            max-height: 80vh; overflow-y: auto;
            position: relative;
        }
        
        #question-text { 
            font-size: 22px; margin-top: 0; margin-bottom: 20px; 
            color: #fff; line-height: 1.4;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
        }
        
        .btn { 
            display: flex; align-items: center; width: 100%; 
            margin: 12px 0; padding: 15px; 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            cursor: pointer; 
            border-radius: 10px; font-size: 18px; 
            font-family: 'Fredoka', sans-serif;
            transition: all 0.3s ease; 
            text-align: left;
        }
        
        .btn:hover { 
            background: linear-gradient(45deg, #00ffff, #ff00ff); 
            color: black; 
            font-weight: 600;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }

        /* Chữ "GAME OVER" giữa màn hình */
        #game-over-text {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vh;
            font-weight: 600;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: fadeIn 0.5s ease;
            white-space: nowrap;
            z-index: 10;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="controls">
        <div id="ui">Điểm: <span id="score-num">0</span> &nbsp;|&nbsp; Mạng: <span id="lives-num">3</span></div>
        <div class="dot-counter">Đã ăn: <span id="dot-num">0</span>/3 chấm</div>
        <p class="control-help">Sử dụng ⬅️ ⬆️ ⬇️ ➡️ để di chuyển</p>
    </div>

    <div class="game-scale-wrapper">
        <div id="game-over-text">GAME OVER</div>
        <canvas id="gameCanvas" width="420" height="420"></canvas>
    </div>

    <div id="modal">
        <div id="modal-content">
            <h2 id="question-text">Loading...</h2>
            <div id="answers"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let score = 0, dotCount = 0, lives = 3, isPaused = false, isGameOver = false;
        const tileSize = 20;
        let player = { x: 200, y: 200, size: 10, dx: 0, dy: 0, mouth: 0 };
        let dots = [];
        let ghosts = [];
        let gameLoopInterval;
        
        // --- THUẬT TOÁN AI CHO MA: TỰ ĐỘNG CHUYỂN HƯỚNG KHI CHẠM TƯỜNG (KHÔNG LẮC) ---
        class Ghost {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.dx = tileSize; // Di chuyển ngang ban đầu
                this.dy = 0;
            }

            draw() {
                ctx.beginPath();
                // Đầu tròn
                ctx.arc(this.x + tileSize / 2, this.y + tileSize / 2, 8, Math.PI, 0);
                // Vạt áo
                ctx.lineTo(this.x + tileSize - 2, this.y + tileSize - 2);
                ctx.lineTo(this.x + 2, this.y + tileSize - 2);
                ctx.closePath();
                
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            update() {
                // Thử di chuyển theo hướng hiện tại
                let nextX = this.x + this.dx;
                let nextY = this.y + this.dy;

                // Nếu chạm tường thì tìm hướng mới
                if (checkWallCollision(nextX, nextY)) {
                    this.changeDirection();
                } else {
                    this.x = nextX;
                    this.y = nextY;
                }

                // Xuyên tường (đường hầm)
                if (this.x < 0) this.x = canvas.width - tileSize;
                if (this.x >= canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height - tileSize;
                if (this.y >= canvas.height) this.y = 0;
            }

            changeDirection() {
                // Chỉ tìm hướng mới khi đã chạm tường
                let directions = [
                    { dx: tileSize, dy: 0 }, { dx: -tileSize, dy: 0 },
                    { dx: 0, dy: tileSize }, { dx: 0, dy: -tileSize }
                ];
                // Lọc bỏ hướng ngược lại (để không đi giật lùi) và hướng đâm vào tường
                let validMoves = directions.filter(dir => {
                    if (dir.dx === -this.dx && dir.dy === -this.dy) return false;
                    return !checkWallCollision(this.x + dir.dx, this.y + dir.dy);
                });
                // Nếu không có lối đi nào khác, buộc phải quay đầu
                if (validMoves.length === 0) {
                    this.dx = -this.dx; this.dy = -this.dy;
                } else {
                    // Chọn ngẫu nhiên một hướng hợp lệ
                    let move = validMoves[Math.floor(Math.random() * validMoves.length)];
                    this.dx = move.dx; this.dy = move.dy;
                }
            }
        }

        function initLevel() {
            dots = []; ghosts = []; lives = 3; score = 0; dotCount = 0; isGameOver = false;
            document.getElementById("score-num").innerText = 0;
            document.getElementById("lives-num").innerText = 3;
            document.getElementById("dot-num").innerText = 0;
            document.getElementById("game-over-text").style.display = "none";
            
            // Random ra 40 chấm tròn
            for(let i=0; i<40; i++) {
                dots.push({ x: Math.floor(Math.random() * 20) * 20 + 10, y: Math.floor(Math.random() * 20) * 20 + 10 });
            }
            // Tạo 4 con ma với thuật toán AI ổn định
            ghosts.push(new Ghost(60, 60, "red"));
            ghosts.push(new Ghost(340, 60, "magenta"));
            ghosts.push(new Ghost(60, 340, "cyan"));
            ghosts.push(new Ghost(340, 340, "orange"));
            
            // Đặt lại vị trí Pac-Man
            player.x = 200; player.y = 200; player.dx = 0; player.dy = 0;
        }

        // --- CÂU HỎI TIẾNG ANH ---
        let questions = [
            { q: "Preposition: He is good ___ math.", options: ["A. in", "B. at", "C. on", "D. with"], correct: 1 },
            { q: "Synonym: What is the synonym of 'Significant'?", options: ["A. Trivial", "B. Important", "C. Small", "D. Hidden"], correct: 1 },
            { q: "Grammar: 'If it rains, we _____ stay home.'", options: ["A. will", "B. would", "C. had", "D. are"], correct: 0 },
            { q: "Vocabulary: Choose the correct word for the picture.", image: "https://images.unsplash.com/photo-1560806887-1e4cd0b6fac6?w=100&q=80", options: ["A. Apple", "B. Banana", "C. Orange", "D. Cat"], correct: 0 }
        ];

        document.addEventListener("keydown", (e) => {
            if (isGameOver || isPaused) return;
            // Chặn cuộn trang
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) { e.preventDefault(); }
            if (e.key === "ArrowUp") { player.dx = 0; player.dy = -tileSize; }
            if (e.key === "ArrowDown") { player.dx = 0; player.dy = tileSize; }
            if (e.key === "ArrowLeft") { player.dx = -tileSize; player.dy = 0; }
            if (e.key === "ArrowRight") { player.dx = tileSize; player.dy = 0; }
        });

        // Vẽ tường (Cố định, sắc nét)
        function checkWallCollision(x, y) {
            // Logic tường tạm thời: Không được ra khỏi biên
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return true;
            return false;
        }

        // Vẽ các yếu tố sắc nét
        function drawPlayer() {
            ctx.beginPath();
            let mouthOpen = isPaused || isGameOver ? 0.2 : (Math.sin(player.mouth) * 0.2 + 0.2); 
            player.mouth += 0.4;
            
            let angle = 0;
            if (player.dx > 0) angle = 0;
            else if (player.dx < 0) angle = Math.PI;
            else if (player.dy > 0) angle = Math.PI / 2;
            else if (player.dy < 0) angle = -Math.PI / 2;

            ctx.arc(player.x + tileSize/2, player.y + tileSize/2, player.size, angle + mouthOpen * Math.PI, angle + (2 - mouthOpen) * Math.PI);
            ctx.lineTo(player.x + tileSize/2, player.y + tileSize/2);
            ctx.fillStyle = "#ffff00"; 
            ctx.shadowBlur = 15; ctx.shadowColor = "#ffff00"; ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0;
        }

        function drawDots() {
            ctx.fillStyle = "#00ffff";
            dots.forEach(dot => {
                ctx.beginPath(); ctx.arc(dot.x, dot.y, 3, 0, Math.PI * 2); 
                ctx.shadowBlur = 10; ctx.shadowColor = "#00ffff"; ctx.fill(); ctx.closePath();
            });
            ctx.shadowBlur = 0;
        }

        // --- VÒNG LẶP CHÍNH CỦA GAME (GAME LOOP) ---
        function update() {
            if (isPaused || isGameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawDots();

            // Cập nhật vị trí Pacman
            player.x += player.dx; player.y += player.dy;
            if (player.x < 0) player.x = canvas.width - tileSize; if (player.x >= canvas.width) player.x = 0;
            if (player.y < 0) player.y = canvas.height - tileSize; if (player.y >= canvas.height) player.y = 0;
            player.dx = 0; player.dy = 0; // Đi theo từng ô một

            // Check ăn chấm
            let centerC = Math.floor(player.x / tileSize) * tileSize + 10;
            let centerR = Math.floor(player.y / tileSize) * tileSize + 10;
            for (let i = 0; i < dots.length; i++) {
                if (dots[i].x === centerC && dots[i].y === centerR) {
                    dots.splice(i, 1); score += 10; dotCount++;
                    document.getElementById("score-num").innerText = score;
                    document.getElementById("dot-num").innerText = dotCount;
                    
                    if (dotCount === 3) { setTimeout(triggerQuestion, 150); }
                    if (dots.length === 0) initLevel();
                    break;
                }
            }

            // Cập nhật và vẽ ma
            ghosts.forEach(g => {
                g.update(); g.draw();
                // Check va chạm ma: Mất mạng
                if (Math.hypot(player.x + tileSize/2 - (g.x + tileSize/2), player.y + tileSize/2 - (g.y + tileSize/2)) < tileSize - 5) {
                    handleGhostCollision();
                }
            });

            drawPlayer();
        }

        // --- HỆ THỐNG MẠNG & GAME OVER ---
        function handleGhostCollision() {
            lives--; document.getElementById("lives-num").innerText = lives;
            isPaused = true;
            if (lives <= 0) {
                // GAME OVER vĩnh viễn
                isGameOver = true;
                document.getElementById("game-over-text").style.display = "block";
            } else {
                // Mất 1 mạng, reset vị trí, chơi tiếp
                alert("Bạn bị ma bắt! Mất 1 mạng.");
                player.x = 200; player.y = 200; player.dx = 0; player.dy = 0;
                isPaused = false;
            }
        }

        function triggerQuestion() {
            isPaused = true;
            const modal = document.getElementById("modal");
            const qData = questions[Math.floor(Math.random() * questions.length)];
            
            document.getElementById("question-text").innerText = qData.q;
            const ansDiv = document.getElementById("answers");
            ansDiv.innerHTML = ""; // Xóa cũ
            
            qData.options.forEach((opt, index) => {
                let btn = document.createElement("button");
                btn.className = "btn"; btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, qData.correct);
                ansDiv.appendChild(btn);
            });
            modal.style.display = "block";
        }

        function checkAnswer(selectedIndex, correctIndex) {
            if (selectedIndex === correctIndex) { score += 50; }
            document.getElementById("score-num").innerText = score;
            dotCount = 0; document.getElementById("dot-num").innerText = 0;
            document.getElementById("modal").style.display = "none";
            isPaused = false;
        }

        // Chạy game ở tốc độ ổn định
        initLevel();
        gameLoopInterval = setInterval(update, 120); 
    </script>
</body>
</html>
